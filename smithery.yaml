startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      vaultPath:
        type: string
        description: "Path to your Obsidian vault (or any Markdown directory)"
      ollamaEndpoint:
        type: string
        description: "Ollama API endpoint for local worker delegation (optional)"
      openrouterApiKey:
        type: string
        description: "OpenRouter API key for cloud worker delegation (optional)"
      vaultScopes:
        type: string
        description: "JSON mapping of scope names to vault subdirectories (optional)"
  commandFunction: |-
    (config) => ({
      command: 'uvx',
      args: ['--upgrade', 'hive-vault'],
      env: {
        ...(config.vaultPath && { VAULT_PATH: config.vaultPath }),
        ...(config.ollamaEndpoint && { HIVE_OLLAMA_ENDPOINT: config.ollamaEndpoint }),
        ...(config.openrouterApiKey && { OPENROUTER_API_KEY: config.openrouterApiKey }),
        ...(config.vaultScopes && { HIVE_VAULT_SCOPES: config.vaultScopes })
      }
    })
  exampleConfig:
    vaultPath: "~/Projects/knowledge"
